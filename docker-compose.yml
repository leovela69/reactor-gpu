version: '3.8'
services:
  reactor:
    build: .
    container_name: reactor
    restart: unless-stopped
    ports:
      - "9091:9091"
    env_file:
      - .env
    volumes:
      - reactor_data:/app/data
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
volumes:
  reactor_data:
